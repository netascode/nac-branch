meraki:
  domains:
    - name: !env domain
      administrator:
        name: admin
      organizations:
        - name: !env org_name
          managed: false
          login_security:
            enforce_password_expiration: false
            password_expiration_days: 40
            enforce_different_passwords: true
            num_different_passwords: 3
            enforce_strong_passwords: true
            enforce_account_lockout: true
            account_lockout_attempts: 5
            enforce_idle_timeout: true
            idle_timeout_minutes: 90
            enforce_two_factor_auth: false
            enforce_login_ip_ranges: false
            login_ip_ranges: []
            api_authentication:
              enabled: false
              ranges: []
          snmp:
            v2c: false
            v3: true
            v3_auth_mode: MD5
            v3_auth_pass: !env v3_auth_pass
            v3_priv_mode: AES128
            v3_priv_pass: !env v3_priv_pass
            peer_ips: []
          policy_objects:
            - name: "DATA Subnet"
              category: network
              type: cidr
              cidr: "10.10.0.0/16"
            - name: "Corp RADIUS"
              category: network
              type: cidr
              cidr: "10.102.1.157"
              group_names:
                - Corp Shared Services
            - name: "Corp DNS-DHCP"
              category: network
              type: cidr
              cidr: "10.102.1.160"
              group_names:
                - Corp Shared Services
            - name: "Corp Mgt"
              category: network
              type: cidr
              cidr: "10.102.1.160"
              group_names:
                - Corp Shared Services
            - name: "Corp SNMP"
              category: network
              type: cidr
              cidr: "10.102.1.161"
              group_names:
                - Corp Shared Services
            - name: "Voice Subnet"
              category: network
              type: cidr
              cidr: "10.20.0.0/16"
            - name: "INFRA Subnet"
              category: network
              type: cidr
              cidr: "10.250.0.0/16"
            - name: "IoT Subnet"
              category: network
              type: cidr
              cidr: "10.30.0.0/16"
            - name: "Branch 1 Printer 1"
              category: network
              type: cidr
              cidr: "10.30.1.101"
              group_names:
                - Branch 1 Printers
            - name: "Branch 1 Printer 2"
              category: network
              type: cidr
              cidr: "10.30.1.102"
              group_names:
                - Branch 1 Printers
            - name: "PCI Subnet"
              category: network
              type: cidr
              cidr: "10.40.0.0/16"
            - name: "Default Subnet"
              category: network
              type: cidr
              cidr: "192.168.128.0/24"
            - name: "Guest Subnet"
              category: network
              type: cidr
              cidr: "172.16.99.0/24"
          policy_objects_groups:
            - name: Corp Shared Services
              category: NetworkObjectGroup
              object_names:
                - Corp RADIUS
                - Corp DNS-DHCP
                - Corp Mgt
                - Corp SNMP
            - name: Branch 1 Printers
              category: NetworkObjectGroup
              object_names:
                - Branch 1 Printer 1
                - Branch 1 Printer 2          
          adaptive_policy:
              settings_enabled_networks:
                - Unified Branch 1
                - Unified Branch 2
              groups:
                - name: Finance_User_Group
                  description: Employee Finance User Group
                  sgt: 10
                - name: Marketing_User_Group
                  description: Employee Marketing User Group
                  sgt: 20
                - name: Finance_Server_Group
                  description: Finance Server Group
                  sgt: 100
                - name: Marketing_Server_Group
                  description: Marketing Server Group
                  sgt: 200
                - name: Unknown
                  description: Created by Meraki, the Unknown group applies when a policy is specified for unsuccessful group classification
                  sgt: 0
                  managed: false
                - name: Infrastructure
                  description: Created by Meraki, the Infrastructure group applies to network infrastructure devices
                  sgt: 2
                  managed: false
              policies:
                - name: Finance Users to Finance Servers
                  source_group:
                    name: Finance_User_Group
                    sgt: 10
                  destination_group:
                    name: Finance_Server_Group
                    sgt: 100
                  last_entry_rule: allow
                - name: Finance Servers to Finance Users
                  source_group:
                    name: Finance_Server_Group
                    sgt: 100
                  destination_group:
                    name: Finance_User_Group
                    sgt: 10
                  last_entry_rule: allow
                - name: Marketing Users to Marketing Servers
                  source_group:
                    name: Marketing_User_Group
                    sgt: 20
                  destination_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  last_entry_rule: allow
                - name: Marketing Servers to Marketing Users
                  source_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  destination_group:
                    name: Marketing_User_Group
                    sgt: 20
                  last_entry_rule: allow
                - name: Finance Users to Marketing Servers
                  source_group:
                    name: Finance_User_Group
                    sgt: 10
                  destination_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  last_entry_rule: deny
                - name: Marketing Servers to Finance Users
                  source_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  destination_group:
                    name: Finance_User_Group
                    sgt: 10
                  last_entry_rule: deny
                - name: Marketing Users to Finance Servers
                  source_group:
                    name: Marketing_User_Group
                    sgt: 20
                  destination_group:
                    name: Finance_Server_Group
                    sgt: 100
                  last_entry_rule: deny
                - name: Finance Servers to Marketing Users
                  source_group:
                    name: Finance_Server_Group
                    sgt: 100
                  destination_group:
                    name: Marketing_User_Group
                    sgt: 20
                  last_entry_rule: deny
                - name: Finance Users to Marketing Users
                  source_group:
                    name: Finance_User_Group
                    sgt: 10
                  destination_group:
                    name: Marketing_User_Group
                    sgt: 20
                  last_entry_rule: allow
                - name: Marketing Users to Finance Users
                  source_group:
                    name: Marketing_User_Group
                    sgt: 20
                  destination_group:
                    name: Finance_User_Group
                    sgt: 10
                  last_entry_rule: allow
                - name: Finance Users to Unknown
                  source_group:
                    name: Finance_User_Group
                    sgt: 10
                  destination_group:
                    name: Unknown
                    sgt: 0
                  last_entry_rule: allow
                - name: Unknown to Finance Users
                  source_group:
                    name: Unknown
                    sgt: 0
                  destination_group:
                    name: Finance_User_Group
                    sgt: 10
                  last_entry_rule: allow
                - name: Marketing Users to Unknown
                  source_group:
                    name: Marketing_User_Group
                    sgt: 20
                  destination_group:
                    name: Unknown
                    sgt: 0
                  last_entry_rule: allow
                - name: Unknown to Marketing Users
                  source_group:
                    name: Unknown
                    sgt: 0
                  destination_group:
                    name: Marketing_User_Group
                    sgt: 20
                  last_entry_rule: allow
                - name: Finance Servers to Unknown
                  source_group:
                    name: Finance_Server_Group
                    sgt: 100
                  destination_group:
                    name: Unknown
                    sgt: 0
                  last_entry_rule: allow
                - name: Unknown to Finance Servers
                  source_group:
                    name: Unknown
                    sgt: 0
                  destination_group:
                    name: Finance_Server_Group
                    sgt: 100
                  last_entry_rule: allow
                - name: Marketing Servers to Unknown
                  source_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  destination_group:
                    name: Unknown
                    sgt: 0
                  last_entry_rule: allow
                - name: Unknown to Marketing Servers
                  source_group:
                    name: Unknown
                    sgt: 0
                  destination_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  last_entry_rule: allow
                - name: Finance Users to Infrastructure
                  source_group:
                    name: Finance_User_Group
                    sgt: 10
                  destination_group:
                    name: Infrastructure
                    sgt: 2
                  last_entry_rule: allow
                - name: Infrastructure to Finance Users
                  source_group:
                    name: Infrastructure
                    sgt: 2
                  destination_group:
                    name: Finance_User_Group
                    sgt: 10
                  last_entry_rule: allow
                - name: Marketing Users to Infrastructure
                  source_group:
                    name: Marketing_User_Group
                    sgt: 20
                  destination_group:
                    name: Infrastructure
                    sgt: 2
                  last_entry_rule: allow
                - name: Infrastructure to Marketing Users
                  source_group:
                    name: Infrastructure
                    sgt: 2
                  destination_group:
                    name: Marketing_User_Group
                    sgt: 20
                  last_entry_rule: allow
                - name: Finance Servers to Infrastructure
                  source_group:
                    name: Finance_Server_Group
                    sgt: 100
                  destination_group:
                    name: Infrastructure
                    sgt: 2
                  last_entry_rule: allow
                - name: Infrastructure to Finance Servers
                  source_group:
                    name: Infrastructure
                    sgt: 2
                  destination_group:
                    name: Finance_Server_Group
                    sgt: 100
                  last_entry_rule: allow
                - name: Marketing Servers to Infrastructure
                  source_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  destination_group:
                    name: Infrastructure
                    sgt: 2
                  last_entry_rule: allow
                - name: Infrastructure to Marketing Servers
                  source_group:
                    name: Infrastructure
                    sgt: 2
                  destination_group:
                    name: Marketing_Server_Group
                    sgt: 200
                  last_entry_rule: allow
          integrations:
            xdr_networks:
              - network_name: Unified Branch 1
                product_types:
                  - appliance
              - network_name: Unified Branch 2
                product_types:
                  - appliance
          appliance:
            vpn_site_to_site_ipsec_peers_slas:
              - name: sla policy
                uri: http://checkthisendpoint.com
            third_party_vpn_peers:
              - name: Secure Access Primary
                public_ip: 146.112.67.39
                private_subnets:
                  - "0.0.0.0/0"
                secret: !env umbrella_secret
                ike_version: "2"
                local_id: primary@sse-tunnel.example.com
                ipsec_policies:
                  ike_auth_algo:
                    - sha1
                  ike_cipher_algo:
                    - aes256
                  ike_diffie_hellman_group:
                    - group14
                  ike_prf_algo:
                    - prfsha1
                  ike_lifetime: 14400
                  child_auth_algo:
                    - sha1
                  child_cipher_algo:
                    - aes256
                  child_pfs_group:
                    - disabled
                  child_lifetime: 3600
                network_tags:
                  - SSE
                is_route_based: false
                priority_in_group: 1
                group_active_active_tunnel: true
                group_number: 1
                group_failover_direct_to_internet: false
                sla_policy_name: sla policy
              - name: Secure Access Secondary
                public_ip: 146.112.83.39
                private_subnets:
                  - "0.0.0.0/0"
                secret: !env umbrella_secret
                ike_version: "2"
                local_id: secondary@sse-tunnel.example.com
                ipsec_policies:
                  ike_auth_algo:
                    - sha1
                  ike_cipher_algo: 
                    - aes256
                  ike_diffie_hellman_group: 
                    - group14
                  ike_prf_algo:
                    - prfsha1
                  ike_lifetime: 14400
                  child_auth_algo:
                    - sha1
                  child_cipher_algo:
                    - aes256
                  child_pfs_group:
                    - disabled
                  child_lifetime: 3600
                network_tags:
                  - SSE
                is_route_based: false
                priority_in_group: 2
                group_number: 1
                group_failover_direct_to_internet: false
                sla_policy_name: sla policy
            vpn_firewall_rules:
              rules:
                - comment: "Shared Services"
                  destination_cidr: "10.102.1.157/32,10.102.1.160/32,10.102.1.161/32"
                  destination_port: "Any"
                  policy: allow
                  protocol: any
                  source_cidr: "10.10.0.0/16,10.30.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "Shared Services"
                  destination_cidr: "10.10.0.0/16,10.30.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: allow
                  protocol: any
                  source_cidr: "10.102.1.157/32,10.102.1.160/32,10.102.1.161/32"
                  source_port: "Any"
                  syslog: false
                - comment: "Data Access"
                  destination_cidr: "10.30.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.10.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "IoT Access"
                  destination_cidr: "10.10.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.30.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "Infra Access"
                  destination_cidr: "10.10.0.0/16,10.20.0.0/16,10.30.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.250.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "Voice Access"
                  destination_cidr: "10.10.0.0/16,10.250.0.0/16,10.30.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.20.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "PCI Access"
                  destination_cidr: "10.10.0.0/16,10.250.0.0/16,10.30.0.0/16,10.20.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.40.0.0/16"
                  source_port: "Any"
                  syslog: false
              syslog_default_rule: false