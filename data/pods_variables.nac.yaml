
meraki:
  domains:
    - name: !env domain
      administrator:
        name: admin
      organizations:
        - name: !env org_name
          managed: false
          networks:
            #
            # Small Branch
            #     
            - name: Unified Branch 2
              templates:
                - nw_setup
                - nw_tags
                - nw_management
                - small_branch_inventory
                - wan_dhcp_dhcp
                - app_settings
                - app_spoke
                - app_ports
                - app_vlans
                - app_fixed_ip_assignments
                - app_fw
                - app_ts
                - app_vpn_exclusions
                - app_content
                - app_intrusion
                - app_mal
                - internet_policies
                - switch
                - switch_access_policy
                - wireless
                - wireless_radius
                - group_policies
                - webhooks
              variables:
                sgt_pass: true
                syslog_server: 3.4.5.6
                syslog_port: 514
                netflow_server: 4.5.6.7
                netflow_port: 2055
                splunk_webhooks_server_url: "https://54.215.224.9:8088/services/collector/event"
                splunk_hec_token: !env splunk_hec_token
                splunk_template_name: splunk_template_branch-2
                splunk_server_name: splunk_server_branch-2
                network_tag_1: small_branch
                network_tags:
                  - small_branch
                  - ubac
                  - UBAC-S
                appliance_01_name: Branch2-appliance-01
                access_switch_01_name: Branch2-Cat9300-01
                access_switch_02_name: Branch2-Cat9300-02
                access_stack_01_name: Access-Stack-01
                ap_01_name: Branch2-ap-01
                ap_02_name: Branch2-ap-02
                appliance_01_serial: !env Appliance
                access_switch_01_serial: !env Switch1
                access_switch_02_serial: !env Switch2
                ap_01_serial: !env AP
                ap_02_serial: !env AP2
                lat: 37.41809510000001
                lng: -122.098531
                wan1_enabled: true
                wan2_enabled: true
                address: Wake Forest, N.C.
                vlan10_subnet: 10.2.10.0/24
                vlan10_appliance_ip: 10.2.10.1
                vlan20_subnet: 10.2.20.0/24
                vlan20_appliance_ip: 10.2.20.1
                vlan30_subnet: 10.2.30.0/24
                vlan30_appliance_ip: 10.2.30.1
                vlan40_subnet:  10.2.40.0/24
                vlan40_appliance_ip: 10.2.40.1
                vlan50_subnet: 10.2.50.0/24
                vlan50_appliance_ip: 10.2.50.1
                vlan999_appliance_ip: 10.2.255.1
                vlan999_subnet: 10.2.255.0/24
                dns_server_1: 8.8.8.8
                dns_server_2: 8.8.4.4
                hubs:
                  - name: Unified Hub
                    default_route: true
                data_wireless_ssid_name: Data
                data_vlan_group_policy: Employees
                voice_vlan_group_policy: Voice
                iot_vlan_group_policy: Iot
                data_ssid_schedules_enabled: true
                guest_wireless_ssid_name: Guest
                guest_wireless_client_bw_down: 0
                guest_wireless_client_bw_up: 0
                guest_wireless_ssid_bw_down: 0
                guest_wireless_ssid_bw_up: 0
                guest_ssid_schedules_enabled: true
                guest_ssid_welcome_message: Unauthorized access is prohibited.
                radius_servers:
                  - host: 172.16.2.1
                    port: 1812
                    secret: !env radius_server1_secret
                  - host: 172.16.2.2
                    port: 1812
                    secret: !env radius_server2_secret
                radius_accounting_servers:
                  - host: 172.16.2.1
                    port: 1813
                    secret: !env radius_accounting_server1_secret
                  - host: 172.16.2.2
                    port: 1813
                    secret: !env radius_accounting_server2_secret
                wireless_radius_servers:
                  - host: 172.16.2.1
                    port: 1812
                    secret: !env wireless_radius_server1_secret
                  - host: 172.16.2.2
                    port: 1812
                    secret: !env wireless_radius_server2_secret
                wireless_radius_accounting_servers:
                  - host: 172.16.2.1
                    port: 1813
                    secret: !env wireless_radius_accounting_server1_secret
                  - host: 172.16.2.2
                    port: 1813
                    secret: !env wireless_radius_accounting_server2_secret
                splash_reply_to_email_address: example@example.com
                switch_mtu_size: 9176
                time_zone: America/New_York
                network_notes: This is a small branch network created via Netascode.
                wan_limit_down: 0
                wan_limit_up: 0
                wan1_limit_down: 400000
                wan1_limit_up: 400000
                wan2_limit_down: 500000
                wan2_limit_up: 500000
                ## corp_dhcp_server1 and corp_dhcp_server2 IPs must be reoutable from the MX appliance
                corp_dhcp_server1: 10.1.1.2
                corp_dhcp_server2: 10.1.1.3
                fixed_ip_assignments:
                  - name: "Switch 1 Management IP"
                    ip: 10.2.255.91
                    mac: aa:bb:cc:dd:ee:fa
                  - name: "Switch 2 Management IP"
                    ip: 10.2.255.92
                    mac: aa:bb:cc:dd:ee:fb
                  - name: "AP 1 Management IP"
                    ip: 10.2.255.93
                    mac: aa:bb:cc:dd:ee:fc
                  - name: "AP 2 Management IP"
                    ip: 10.2.255.94
                    mac: aa:bb:cc:dd:ee:fd
