meraki:
  templates:
    networks:
      - name: internet_policies
        type: model
        configuration:
          appliance:
              sdwan_internet_policies:
                - name: policy 1
                  traffic_filters:
                    - type: custom
                      value:
                        protocol: "any"
                        source:
                          port: any
                          cidr: ${vlan20_subnet}
                        destination:
                          port: any
                          cidr: any
                  preferred_uplink: "wan2"
                  fail_over_criterion: "uplinkDown"
                - name: policy 2
                  traffic_filters:
                    - type: application
                      value:
                        protocol: "any"
                        source:
                          port: any
                          cidr: ${vlan10_subnet}
                        destination:
                          applications:
                            - id: "meraki:layer7/application/182"
                              name: "Office 365"
                              type: "nbar"
                            - id: "meraki:layer7/application/161"
                              name: "WebEx"
                              type: "nbar"
                  preferred_uplink: "wan2"
                  fail_over_criterion: "poorPerformance"
                  performance_class:
                    type: custom
                    custom_performance_class_name: SaaS_Traffic
